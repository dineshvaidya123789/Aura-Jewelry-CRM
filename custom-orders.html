<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Workshop - Aura</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        .kanban-board {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
            min-height: 65vh;
            align-items: flex-start;
        }
        .kanban-column {
            min-width: 300px;
            flex: 1;
            border: 1px solid #333;
            border-radius: 12px;
            background: linear-gradient(180deg, rgba(20,20,20,0.8), rgba(10,10,10,0.95));
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 50vh;
            transition: all 0.3s ease;
        }
        .kanban-header {
            font-family: 'Playfair Display';
            color: var(--accent-gold);
            font-size: 1.2rem;
            padding-bottom: 15px;
            border-bottom: 1px dashed rgba(251, 207, 51, 0.4);
            text-align: center;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .kanban-card {
            background: rgba(251, 207, 51, 0.03);
            border: 1px solid rgba(251, 207, 51, 0.2);
            border-left: 3px solid var(--accent-gold);
            border-radius: 8px;
            padding: 15px;
            cursor: grab;
            transition: 0.2s;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .kanban-card:hover {
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px rgba(251, 207, 51, 0.1);
        }
        .kanban-card:active {
            cursor: grabbing;
            transform: scale(0.98);
        }
        .kanban-column.drag-over {
            background: rgba(251, 207, 51, 0.05);
            border-color: var(--accent-gold);
            box-shadow: inset 0 0 20px rgba(251, 207, 51, 0.1);
        }
        .order-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 10px;
        }
        
        /* Specific column accents */
        #col-Pending\\ Estimate .kanban-header { color: #aaa; border-color: #555; }
        #col-Ready\\ for\\ Pickup .kanban-header { color: var(--success); border-color: var(--success); }
    </style>
</head>
<body>
    <div class="container animate-fadeIn">
        <header class="header">
            <a href="index.html" class="logo">Aura<span>.</span></a>
            <nav style="display: flex; gap: 20px;">
                <a href="jeweler.html" class="btn btn-secondary" style="border:none;">Dashboard</a>
                <a href="inventory.html" class="btn btn-secondary" style="border:none;">Pricing & Inventory</a>
                <a href="leads.html" class="btn btn-secondary" style="border:none;">Leads Pipeline</a>
            </nav>
        </header>

        <main>
            <section class="mb-4 flex justify-between items-center">
                <div>
                    <h2>The Atelier <span style="color: var(--accent-gold); font-family: 'Playfair Display'; font-style: italic;">(Workshop)</span></h2>
                    <p style="color: var(--text-secondary);">Manage custom orders. Drag and drop cards to update client status automatically.</p>
                </div>
                <button class="btn btn-primary" onclick="openNewJobModal()">+ New Custom Job</button>
            </section>
            
            <section class="kanban-board" id="kanban-board">
                <!-- Columns generated by JS -->
            </section>
        </main>
    </div>

    <!-- Quote Modal -->
    <div id="quoteModal" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:100; align-items:center; justify-content:center; backdrop-filter: blur(5px);">
        <div class="card glass-panel" style="width: 100%; max-width: 500px; border: 1px solid var(--accent-gold);">
            <h3 style="color: var(--accent-gold);">Send Price Quote</h3>
            <p id="modal-cust-name" style="color: white; font-weight: bold;"></p>
            <form id="quote-form">
                <input type="hidden" id="qReqId">
                <div class="input-group mt-2">
                    <label>Calculated Quote (₹)</label>
                    <input type="number" id="qPrice" required placeholder="150000">
                </div>
                <div class="input-group">
                    <label>Add a Note for the Client</label>
                    <textarea id="qNote" rows="3" required placeholder="Yes, we can make this exactly like the picture in 22k gold within 14 days."></textarea>
                </div>
                <div class="input-group" style="flex-direction: row; align-items: center; justify-content: center; gap: 10px; background: rgba(251, 207, 51, 0.05); padding: 10px; border-radius: 8px; border: 1px dashed var(--accent-gold);">
                    <input type="checkbox" id="qDeposit" checked style="width: auto; margin:0;">
                    <label style="margin:0; font-size: 0.9rem; color: var(--accent-gold);">Require 20% Secure Deposit (Stripe Escrow)</label>
                </div>
                <div class="flex gap-4">
                    <button type="submit" class="btn btn-primary" style="flex:1;">Send Quote</button>
                    <button type="button" class="btn btn-secondary" onclick="closeQuoteModal()" style="flex:1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- New Job Modal -->
    <div id="newJobModal" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:100; align-items:center; justify-content:center; backdrop-filter: blur(5px);">
        <div class="card glass-panel" style="width: 100%; max-width: 500px; border: 1px solid var(--accent-gold);">
            <h3 style="color: var(--accent-gold);">Log New Custom Job</h3>
            <p style="color: var(--text-secondary);">Add a walk-in client's custom request to the board.</p>
            <form id="new-job-form">
                <div class="input-group">
                    <label>Client Name</label>
                    <input type="text" id="njName" required placeholder="Sara Khan">
                </div>
                <div class="input-group mt-2">
                    <label>Design Description</label>
                    <textarea id="njDesc" rows="3" required placeholder="18K Rose Gold with 2ct center diamond."></textarea>
                </div>
                <div class="flex gap-4 mt-4">
                    <button type="submit" class="btn btn-primary" style="flex:1;">Create Job</button>
                    <button type="button" class="btn btn-secondary" onclick="closeNewJobModal()" style="flex:1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Overlay (Similar to Victory Overlay) -->
    <div id="status-overlay" style="display:none; position: fixed; top:20px; right:20px; z-index:9999; background: var(--success); color: black; padding: 15px 25px; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4); animation: slideInRight 0.3s forwards;">
        Client Notified! ✨
    </div>

    <script src="js/app.js"></script>
    <script>
        const KANBAN_STATUSES = ['Pending Estimate', 'CAD Review', 'In Workshop', 'Final Polish', 'Ready for Pickup'];

        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('auth_role');
            if(role !== 'jeweler') window.location.href = 'index.html';
            renderKanban();
        });

        const renderKanban = () => {
            const reqs = getCustomRequests();
            const board = document.getElementById('kanban-board');
            board.innerHTML = '';

            KANBAN_STATUSES.forEach(status => {
                // Determine icon
                let icon = '💎';
                if(status === 'Pending Estimate') icon = '📝';
                if(status === 'CAD Review') icon = '💻';
                if(status === 'In Workshop') icon = '⚒️';
                if(status === 'Final Polish') icon = '✨';
                if(status === 'Ready for Pickup') icon = '🎁';

                const column = document.createElement('div');
                column.className = 'kanban-column';
                column.id = `col-${status}`;
                column.innerHTML = `<div class="kanban-header">${icon} ${status}</div>`;
                
                // Set up Drag and Drop for Column
                column.addEventListener('dragover', handleDragOver);
                column.addEventListener('dragleave', handleDragLeave);
                column.addEventListener('drop', (e) => handleDrop(e, status));

                const filteredReqs = reqs.filter(r => r.status === status);
                filteredReqs.forEach(r => {
                    const card = document.createElement('div');
                    card.className = 'kanban-card';
                    card.draggable = true;
                    card.dataset.id = r.id;
                    
                    card.addEventListener('dragstart', handleDragStart);
                    card.addEventListener('dragend', handleDragEnd);

                    const quoteHtml = r.quote ? `<p style="margin: 8px 0 0; color: var(--success); font-weight: bold;">₹${r.quote.toLocaleString('en-IN')}</p>` : `<button class="btn btn-secondary" style="font-size: 0.7rem; padding: 4px 8px; margin-top: 10px;" onclick="openQuoteModal(${r.id}, '${r.customerName}')">Generate Quote</button>`;

                    card.innerHTML = `
                        <h4 style="margin: 0; color: white;">${r.customerName}</h4>
                        <p style="margin: 5px 0 0; font-size: 0.9rem; color: #ccc;">"${r.description}"</p>
                        ${quoteHtml}
                        <div class="order-meta">Order #${r.id}</div>
                    `;
                    column.appendChild(card);
                });

                board.appendChild(column);
            });
        };

        // Drag and Drop Logic
        let draggedCardId = null;

        const handleDragStart = (e) => {
            draggedCardId = e.target.dataset.id;
            e.target.style.opacity = '0.5';
        };

        const handleDragEnd = (e) => {
            e.target.style.opacity = '1';
            const cols = document.querySelectorAll('.kanban-column');
            cols.forEach(c => c.classList.remove('drag-over'));
        };

        const handleDragOver = (e) => {
            e.preventDefault(); // Necessary to allow drop
            const col = e.target.closest('.kanban-column');
            if(col) col.classList.add('drag-over');
        };

        const handleDragLeave = (e) => {
            const col = e.target.closest('.kanban-column');
            if(col) col.classList.remove('drag-over');
        };

        const handleDrop = (e, targetStatus) => {
            e.preventDefault();
            const cols = document.querySelectorAll('.kanban-column');
            cols.forEach(c => c.classList.remove('drag-over'));

            if(draggedCardId) {
                const reqs = getCustomRequests();
                const job = reqs.find(x => x.id == draggedCardId);
                
                if(job && job.status !== targetStatus) {
                    updateCustomRequestStatus(draggedCardId, targetStatus);
                    
                    // Show small notification for certain statuses
                    if(targetStatus === 'Final Polish' || targetStatus === 'Ready for Pickup' || targetStatus === 'In Workshop') {
                        showStatusOverlay();
                    }
                    
                    renderKanban();
                }
            }
            draggedCardId = null;
        };

        // Modal Logic
        const openQuoteModal = (id, name) => {
            document.getElementById('qReqId').value = id;
            document.getElementById('modal-cust-name').innerText = `Request from: ${name}`;
            document.getElementById('quoteModal').style.display = 'flex';
        };

        const closeQuoteModal = () => {
            document.getElementById('quoteModal').style.display = 'none';
        };

        document.getElementById('quote-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('qReqId').value;
            const price = parseFloat(document.getElementById('qPrice').value);
            const note = document.getElementById('qNote').value;
            const requiresDeposit = document.getElementById('qDeposit').checked;
            
            quoteCustomRequest(id, price, note, requiresDeposit);
            closeQuoteModal();
            renderKanban();
            alert('Quote sent! The client has received a secure payment link notification.');
        });
        
        // New Job Modal
        const openNewJobModal = () => { document.getElementById('newJobModal').style.display = 'flex'; };
        const closeNewJobModal = () => { document.getElementById('newJobModal').style.display = 'none'; };
        
        document.getElementById('new-job-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('njName').value;
            const desc = document.getElementById('njDesc').value;
            addCustomRequest(Date.now(), name, desc); // Generate random ID for walk-in customer
            closeNewJobModal();
            e.target.reset();
            renderKanban();
        });

        // UI Overlay
        const showStatusOverlay = () => {
            const overlay = document.getElementById('status-overlay');
            overlay.style.display = 'block';
            setTimeout(() => { overlay.style.display = 'none'; }, 3000);
        };
    </script>
</body>
</html>
